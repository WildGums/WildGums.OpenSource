name: Deploy docfx documentation

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@3e891b0cb619bf60e2c25674b222b8940e2c1c25 # v4.1.0
        with:
          dotnet-version: '8.x'

      - name: Install docfx
        run: dotnet tool update -g docfx

      - name: Build documentation
        run: docfx doc/docfx/docfx.json

      - name: Copy CNAME file
        run: cp doc/docfx/CNAME doc/docfx/_site/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d231e62369c1bc400 # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: doc/docfx/_site
          publish_branch: gh-pages
          force_orphan: true
